<!doctype html>
<html lang="uk">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Адмінка</title>
      <link rel="stylesheet" href="/admin/stylesForm.css" />
   </head>
   <body>
      <!-- ЛОГІН -->
      <div id="login-screen">
         <div class="login-box">
            <h2>Вхід</h2>
            <input type="email" id="email" placeholder="Email" />
            <div style="position: relative">
               <input type="password" id="password" placeholder="Пароль" />
               <span
                  onclick="togglePassword()"
                  style="
                     position: absolute;
                     right: 12px;
                     top: 50%;
                     transform: translateY(-50%);
                     cursor: pointer;
                  "
                  >👁</span
               >
            </div>
            <button onclick="login()">Увійти</button>
            <p id="login-error"></p>
         </div>
      </div>

      <!-- АДМІНКА -->
      <div id="admin-screen" style="display: none">
         <div class="admin-wrap">
            <div class="admin-header">
               <h2>Управління товарами</h2>
               <button onclick="logout()">Вийти</button>
            </div>

            <!-- ФОРМА ДОДАВАННЯ -->
            <div class="admin-form">
               <h3>Додати товар</h3>
               <input
                  type="text"
                  id="name"
                  placeholder="Назва товару не більше 25 символів"
                  maxlength="25"
               />
               <small id="name-count">0/25</small>

               <textarea
                  id="desc"
                  placeholder="Опис товару не більше 150 символів"
                  maxlength="150"
               ></textarea>
               <small id="desc-count">0/150</small>

               <input type="file" id="photo" accept="image/*" />
               <button onclick="addProduct()">Додати</button>
               <p id="form-status"></p>
            </div>

            <!-- СПИСОК ТОВАРІВ -->
            <div class="admin-list" id="products-list"></div>
         </div>
      </div>

      <script type="module" src="/admin/admin.js"></script>
   </body>
</html>
